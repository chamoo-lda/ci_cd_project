---
#
# playbook_web_server.yml
# =======================
# Inventory: uses the aws_ec2 plugin (see ansible/inventory/aws_ec2.yml)
#

- name: Build and deploy Dockerised nginx web app on EC2
  hosts: aws_ec2
  become: true
  vars:
    ansible_python_interpreter: auto # let Ansible auto-detect the system Python

  tasks:
    # ---- Package management ----
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages to the latest version
      ansible.builtin.apt:
        upgrade: dist

    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Install Git
      ansible.builtin.apt:
        name: git
        state: present

    # ---- Docker SDK (required by community.docker modules) ----
    - name: Install Docker SDK for Python on the target
      ansible.builtin.pip:
        name: docker
        state: present

    # ---- Source code ----
    - name: Clone or update the repository
      ansible.builtin.git:
        repo: "https://github.com/chamoo-lda/ci_cd_project.git"
        dest: "/home/ubuntu/ci_cd_project"
        force: true # overwrite local changes on re-run

    # ---- Docker image ----
    - name: Build Docker image from Dockerfile
      community.docker.docker_image:
        name: dbs_web_app
        source: build
        build:
          path: /home/ubuntu/ci_cd_project
        state: present

    # ---- Docker container ----
    - name: Run Docker container
      community.docker.docker_container:
        name: dbs_web_app_container
        image: dbs_web_app
        state: started
        restart_policy: always
        ports:
          - "80:80"

    # ---- Smoke test ----
    - name: Confirm web server is responding
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: webserver_check

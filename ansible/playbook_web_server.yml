---
- name: Install and configure Apache on EC2 instances
  hosts: aws_ec2
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3.10

  tasks:
    # Update and upgrade packages
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages to the latest version
      ansible.builtin.apt:
        upgrade: dist

    # Install GIT and Docker on the EC2 instances
    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Install GIT
      ansible.builtin.apt:
        name: git
        state: present

    # Start and enable Docker service
    - name: Confirm Docker is installed and running
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false

    - name: Git clone a folder from repository
      ansible.builtin.git:
        repo: "https://github.com/chamoo-lda/ci_cd_project.git"
        dest: "/home/ubuntu/ci_cd_project"

    - name: Build Docker image from Dockerfile
      community.docker.docker_image:
        name: dbs_web_app
        path: /home/ubuntu/ci_cd_project
        buildargs:

    - name: Run Docker container
      community.docker.docker_container:
        name: dbs_web_app_container
        image: dbs_web_app
        state: started
        restart_policy: always
        ports:
          - "80:80"

    - name: Confirm webserver in docker container is running
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: webserver_check

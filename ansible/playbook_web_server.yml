---
- name: Install and configure Apache on EC2 instances
  hosts: aws_ec2
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3.10

  tasks:
    # Update and upgrade packages
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages to the latest version
      ansible.builtin.apt:
        upgrade: dist

    # Install GIT and Docker on the EC2 instances
    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Install GIT
      ansible.builtin.apt:
        name: git
        state: present

    # Start and enable Apache service
    - name: Ensure Apache is started and enabled on boot
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true

    - name: Confirm Apache is responding
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: apache_check

    - name: Show Apache check result
      ansible.builtin.debug:
        msg: "Apache is up and responding with status {{ apache_check.status }}"

    - name: Confirm Docker is installed and running
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false

    - name: Git clone a folder from repository
      ansible.builtin.git:
        repo: "https://github.com/chamoo-lda/ci_cd_project.git"
        dest: "/home/ubuntu/ci_cd_project"
        force: true

    - name: Build Docker image from Dockerfile
      ansible.builtin.docker_image:
        name: dbs_web_app
        path: /home/ubuntu/ci_cd_project
        buildargs:

    - name: Run Docker container
      ansible.builtin.docker_container:
        name: dbs_web_app_container
        image: dbs_web_app
        state: started
        restart_policy: always
        ports:
          - "80:80"
